<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Link Afiliado</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="affiliate-container">
    <h1>Gerar link afiliado</h1>
    <p class="subtitle">
      Cole o link do produto do Mercado Livre e gere o link para compartilhar.
    </p>

    <label for="mlLink">Link do produto</label>
    <input
      id="mlLink"
      type="url"
      placeholder="https://www.mercadolivre.com.br/..."
      required
    />

    <button id="btnGerar">Gerar</button>

    <div id="status" class="status"></div>

    <div id="resultBox" class="result-box">
      <label for="outLink">Link gerado</label>
      <input id="outLink" readonly />
      <button id="btnCopiar">Copiar</button>
    </div>
  </section>

  <script>
    const API_URL = "https://api.plataformadoti.com.br/create";

    const mlLink = document.getElementById("mlLink");
    const btnGerar = document.getElementById("btnGerar");
    const status = document.getElementById("status");
    const resultBox = document.getElementById("resultBox");
    const outLink = document.getElementById("outLink");
    const btnCopiar = document.getElementById("btnCopiar");

    btnGerar.addEventListener("click", async () => {
      const link = (mlLink.value || "").trim();

      resultBox.style.display = "none";
      status.textContent = "Gerando...";

      if (!link.startsWith("http")) {
        status.textContent = "Informe um link válido.";
        return;
      }

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ link })
        });

        const data = await response.json();

        if (!response.ok) {
          status.textContent = data.error || "Erro ao gerar link.";
          return;
        }

        outLink.value = data.link_afiliado;
        resultBox.style.display = "block";
        status.textContent = "Link gerado com sucesso.";

      } catch (error) {
        status.textContent = "Falha ao conectar com o servidor.";
      }
    });

    btnCopiar.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(outLink.value);
        status.textContent = "Link copiado.";
      } catch {
        outLink.select();
        document.execCommand("copy");
        status.textContent = "Link copiado.";
      }
    });
  </script>

</body>
</html>
