<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gerador de Link Afiliado</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="page">
    <section class="card">
      <header class="card__header">
        <div class="badge">Plataforma do TI</div>
        <h1 class="title">GERADOR DE LINK DE AFILIADO</h1>
        <p class="subtitle">
          Cole o link do produto do Mercado Livre e gere um link pronto para compartilhar.
        </p>
      </header>

      <div class="form">
        <label class="label" for="mlLink">Link do produto</label>
        <div class="input-wrap">
          <input
            id="mlLink"
            class="input"
            type="url"
            placeholder="https://www.mercadolivre.com.br/..."
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <div class="actions">
          <button id="btnGerar" class="btn btn--primary" type="button">
            <span class="btn__text">Gerar link</span>
            <span class="btn__spinner" aria-hidden="true"></span>
          </button>

          <button id="btnLimpar" class="btn btn--ghost" type="button">
            Limpar
          </button>
        </div>

        <div id="status" class="status" role="status" aria-live="polite"></div>

        <div id="resultBox" class="result">
          <div class="result__header">
            <h2 class="result__title">Link gerado</h2>
            <p class="result__hint">Copie e compartilhe com quem solicitou.</p>
          </div>

          <div class="result__body">
            <input id="outLink" class="input input--readonly" readonly />
            <button id="btnCopiar" class="btn btn--secondary" type="button">
              Copiar
            </button>
          </div>
        </div>
      </div>

      <footer class="card__footer">
        <p class="footer-text">
          Se der erro, provavelmente o cookie do Mercado Livre expirou e precisa ser atualizado no Cloudflare.
        </p>
      </footer>
    </section>
  </main>

  <script>
    // Ajuste aqui
    const API_URL = "https://api.plataformadoti.com.br";
    const API_KEY = "pltdti_2026_secure";

    const mlLink = document.getElementById("mlLink");
    const btnGerar = document.getElementById("btnGerar");
    const btnLimpar = document.getElementById("btnLimpar");
    const statusEl = document.getElementById("status");
    const resultBox = document.getElementById("resultBox");
    const outLink = document.getElementById("outLink");
    const btnCopiar = document.getElementById("btnCopiar");

    const setStatus = (msg, type = "info") => {
      statusEl.className = `status status--${type}`;
      statusEl.textContent = msg || "";
    };

    const setLoading = (isLoading) => {
      btnGerar.disabled = isLoading;
      btnGerar.classList.toggle("is-loading", isLoading);
    };

    // Extrai a URL meli.la do texto retornado pelo Worker
    const extractMeli = (value) => {
      if (!value) return null;
      const text = String(value);
      const match = text.match(/https?:\/\/meli\.la\/[A-Za-z0-9]+/);
      return match ? match[0] : null;
    };

    btnLimpar.addEventListener("click", () => {
      mlLink.value = "";
      outLink.value = "";
      resultBox.style.display = "none";
      setStatus("");
      mlLink.focus();
    });

    btnGerar.addEventListener("click", async () => {
      const link = (mlLink.value || "").trim();

      resultBox.style.display = "none";
      outLink.value = "";
      setStatus("");

      if (!link.startsWith("http")) {
        setStatus("Informe um link válido do Mercado Livre.", "error");
        return;
      }

      try {
        setLoading(true);
        setStatus("Gerando link...", "info");

        const resp = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-API-Key": API_KEY
          },
          body: JSON.stringify({ link })
        });

        const data = await resp.json().catch(() => ({}));

        if (!resp.ok) {
          const msg = data?.error || "Erro ao gerar link.";
          setStatus(msg, "error");
          return;
        }

        // Seu backend devolve: { link_afiliado: "texto... https://meli.la/xxxx" }
        const meli = extractMeli(data.link_afiliado);
        if (!meli) {
          setStatus("Resposta recebida, mas não encontrei o link meli.la.", "error");
          return;
        }

        outLink.value = meli;
        resultBox.style.display = "block";
        setStatus("Link gerado com sucesso.", "success");

      } catch (e) {
        setStatus("Falha ao conectar com a API.", "error");
      } finally {
        setLoading(false);
      }
    });

    btnCopiar.addEventListener("click", async () => {
      if (!outLink.value) return;

      try {
        await navigator.clipboard.writeText(outLink.value);
        setStatus("Link copiado.", "success");
      } catch {
        outLink.select();
        document.execCommand("copy");
        setStatus("Link copiado.", "success");
      }
    });
  </script>

</body>
</html>
